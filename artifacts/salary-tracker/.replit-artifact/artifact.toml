kind = "web"
previewPath = "/"
title = "OF Chatter Salary Tracker"
version = "1.0.0"
id = "artifacts/salary-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20944

[services.development]
run = "pnpm --filter @workspace/salary-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salary-tracker", "run", "build" ]
publicDir = "artifacts/salary-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20944"
BASE_PATH = "/"
