openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: weeks
    description: Weekly salary tracking records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '201':
          description: Account created and session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Logged in successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Log out and clear session
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /weeks:
    get:
      tags: [weeks]
      operationId: getWeeks
      summary: Get all week records for the current user
      responses:
        '200':
          description: List of week records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeekRecordList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [weeks]
      operationId: createWeek
      summary: Create a new week record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWeekRequest'
      responses:
        '201':
          description: Week record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeekRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /weeks/{id}:
    put:
      tags: [weeks]
      operationId: updateWeek
      summary: Update a week record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWeekRequest'
      responses:
        '200':
          description: Week record updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeekRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Week not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [weeks]
      operationId: deleteWeek
      summary: Delete a week record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Week deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Week not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
    AuthUser:
      type: object
      required: [id, username, isAdmin]
      properties:
        id:
          type: string
        username:
          type: string
        isAdmin:
          type: boolean
    AdminWeekRecord:
      type: object
      required: [id, label, chatterName, weekStart, days, createdAt, userId, userUsername]
      properties:
        id:
          type: string
        label:
          type: string
        chatterName:
          type: string
        weekStart:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayEntry'
        createdAt:
          type: string
        userId:
          type: string
        userUsername:
          type: [string, 'null']
    AdminWeekList:
      type: object
      required: [weeks]
      properties:
        weeks:
          type: array
          items:
            $ref: '#/components/schemas/AdminWeekRecord'
    AdminUserRecord:
      type: object
      required: [id, username, isAdmin, createdAt, weekCount]
      properties:
        id:
          type: string
        username:
          type: [string, 'null']
        isAdmin:
          type: boolean
        createdAt:
          type: string
        weekCount:
          type: number
    AdminUserList:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserRecord'
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    DayEntry:
      type: object
      required: [day, netSales, worked]
      properties:
        day:
          type: string
        netSales:
          type: number
        worked:
          type: boolean
    WeekRecord:
      type: object
      required: [id, label, chatterName, weekStart, days, createdAt]
      properties:
        id:
          type: string
        label:
          type: string
        chatterName:
          type: string
        weekStart:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayEntry'
        createdAt:
          type: string
    WeekRecordList:
      type: object
      required: [weeks]
      properties:
        weeks:
          type: array
          items:
            $ref: '#/components/schemas/WeekRecord'
    CreateWeekRequest:
      type: object
      required: [label, chatterName, weekStart, days]
      properties:
        label:
          type: string
        chatterName:
          type: string
        weekStart:
          type: string
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayEntry'
